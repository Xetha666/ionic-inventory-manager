<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f3effc",
                    "error-container": "#ffdad6",
                    "primary-fixed": "#e2dfff",
                    "on-primary-fixed": "#0f0069",
                    "on-secondary-container": "#586377",
                    "tertiary-fixed-dim": "#ffb695",
                    "on-background": "#1b1b24",
                    "on-primary": "#ffffff",

                    "on-surface": "#1b1b24",
                    "on-secondary-fixed-variant": "#3c475a",
                    "on-primary-container": "#dad7ff",
                    "surface-container-high": "#eae6f4",
                    "on-secondary-fixed": "#111c2d",

            },
            "borderRadius": {

            "spacing": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-screen flex items-center justify-center p-container-padding font-body-md text-on-background antialiased selection:bg-primary/20 selection:text-primary">
<main class="w-full max-w-[400px] bg-surface-container-lowest rounded-[24px] p-xl shadow-[0_12px_32px_rgba(30,41,59,0.08)] border border-outline-variant/30 flex flex-col relative overflow-hidden">
<!-- Subtle Background Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-primary-fixed/20 blur-3xl rounded-full pointer-events-none"></div>
<!-- Header -->
<header class="text-center mb-xl relative z-10">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary-container rounded-xl mb-md shadow-sm">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">InventoryFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Access your warehouse dashboard</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-lg relative z-10">
<div class="flex flex-col gap-stack-gap">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider ml-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-[48px] pl-11 pr-md rounded-[16px] border border-outline/20 bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-sm" id="email" placeholder="manager@warehouse.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center ml-xs mr-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary/80 transition-colors" href="#">Olvidé mi contraseña</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-[48px] pl-11 pr-md rounded-[16px] border border-outline/20 bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Submit Action -->
<button class="w-full h-[48px] bg-primary text-on-primary rounded-[16px] font-label-caps text-label-caps uppercase tracking-wider flex items-center justify-center gap-sm hover:bg-primary/90 active:scale-[0.98] transition-all shadow-sm mt-sm" type="submit">
                Entrar
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Biometric Auth -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 flex flex-col items-center gap-md relative z-10">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Or authenticate with</span>
<div class="flex gap-lg">
<button aria-label="Use Fingerprint" class="w-14 h-14 rounded-[16px] border border-outline-variant/50 bg-surface flex items-center justify-center text-secondary hover:bg-surface-container hover:text-primary hover:border-primary/30 active:scale-95 transition-all shadow-sm" type="button">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'wght' 300;">fingerprint</span>
</button>
<button aria-label="Use Face ID" class="w-14 h-14 rounded-[16px] border border-outline-variant/50 bg-surface flex items-center justify-center text-secondary hover:bg-surface-container hover:text-primary hover:border-primary/30 active:scale-95 transition-all shadow-sm" type="button">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'wght' 300;">face</span>
</button>
</div>
</div>
</main>
</body></html>
