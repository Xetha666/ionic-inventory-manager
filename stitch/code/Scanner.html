</div>
</div>

<div class="absolute bottom-0 left-0 right-0 h-1/2 bg-gradient-to-t from-inverse-surface/90 to-transparent pointer-events-none"></div>
</div>

</div>

<span class="material-symbols-outlined" data-icon="search">search</span>
</button>

<div class="absolute bottom-[96px] left-0 right-0 px-container-padding z-40 pointer-events-auto">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_24px_48px_-12px_rgba(30,41,59,0.25)] border border-outline-variant/30 overflow-hidden flex flex-col">
<!-- Success/Scan indicator -->
<div class="h-1 w-full bg-primary"></div>
<div class="p-lg flex flex-col gap-lg">
<!-- Product Info -->
<div class="flex items-center gap-md">
<img alt="Close-up of premium wireless headphones on a clean white surface" class="w-12 h-12 rounded-lg object-cover border border-outline-variant" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBNcInJTzuKbNiUCFuy3mbqVfTdqxJxBa-1pYOXupQsp3N5oYY1ELLw2zeG8MP58aDw6ZOVRcuWMud-TTfsR8D8-jNYIwRGA5oqZQ-CqbWh0cmzHOvzO2Jin1924Keyu_ptZ2LTML8dCMbYF9tYcL7IzcNdRBQ6hE7CGyiYsdsgQQwXEzAXbSWYKxbixfZLoHlwH7aNGRu3tl5fc9RKPkhO09AzY0KbhLZWfbXr3n5Zpd1YPj_5PrvKg633qtum0jiLAdh7yJDYuRS"/>
<div class="flex flex-col">
<span class="font-data-tabular text-data-tabular text-secondary">SKU: WH-1000XM5</span>
<span class="font-h2 text-h2 text-on-surface truncate">Sony Noise Cancelling HD</span>
</div>
</div>

<button class="flex-1 py-2 rounded-md bg-surface-container-lowest shadow-sm font-label-caps text-label-caps text-on-surface text-center">ENTRADA</button>
<button class="flex-1 py-2 rounded-md font-label-caps text-label-caps text-secondary text-center hover:bg-surface-container-highest transition-colors">SALIDA</button>
</div>

<input class="w-24 text-center font-h1 text-h1 text-primary bg-transparent border-none focus:ring-0 p-0 m-0" readonly="" type="number" value="12"/>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-lg text-primary hover:bg-primary-fixed active:scale-95 transition-all">
<span class="material-symbols-outlined">add</span>
</button>

<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 w-16 h-14 group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="inventory_2">inventory_2</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Inventory</span>
</button>

</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 w-16 h-14 group">
