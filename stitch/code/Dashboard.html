<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>InventoryFlow Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#ffdbcc",
                      "error": "#ba1a1a",
                      "on-secondary": "#ffffff",
                      "inverse-surface": "#302f39",
                      "secondary": "#545f73",
                      "surface-bright": "#fcf8ff",
                      "outline-variant": "#c7c4d8",
                      "on-tertiary-fixed": "#351000",
                      "surface-container-lowest": "#ffffff",
                      "on-primary-fixed-variant": "#3323cc",
                      "surface-container-low": "#f5f2ff",
                      "surface": "#fcf8ff",
                      "surface-tint": "#4d44e3",
                      "surface-variant": "#e4e1ee",
                      "surface-dim": "#dcd8e5",
                      "tertiary": "#7e3000",
                      "secondary-container": "#d5e0f8",
                      "tertiary-container": "#a44100",
                      "on-tertiary": "#ffffff",
                      "secondary-fixed": "#d8e3fb",
                      "on-error": "#ffffff",
                      "surface-container": "#f0ecf9",
                      "primary-fixed-dim": "#c3c0ff",
                      "primary-container": "#4f46e5",
                      "on-surface-variant": "#464555",
                      "surface-container-highest": "#e4e1ee",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#f3effc",
                      "error-container": "#ffdad6",
                      "primary-fixed": "#e2dfff",
                      "on-primary-fixed": "#0f0069",
                      "on-secondary-container": "#586377",
                      "tertiary-fixed-dim": "#ffb695",
                      "on-background": "#1b1b24",
                      "on-primary": "#ffffff",
                      "primary": "#3525cd",
                      "on-surface": "#1b1b24",
                      "on-secondary-fixed-variant": "#3c475a",
                      "on-primary-container": "#dad7ff",
                      "surface-container-high": "#eae6f4",
                      "on-secondary-fixed": "#111c2d",
                      "inverse-primary": "#c3c0ff",
                      "outline": "#777587",
                      "secondary-fixed-dim": "#bcc7de",
                      "on-tertiary-fixed-variant": "#7b2f00",
                      "on-tertiary-container": "#ffd2be",
                      "background": "#fcf8ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "sm": "8px",
                      "stack-gap": "12px",
                      "xl": "32px",
                      "lg": "24px",
                      "container-padding": "16px",
                      "md": "16px",
                      "base": "4px",
                      "xs": "4px"
              },
              "fontFamily": {
                      "data-tabular": [
                              "inter"
                      ],
                      "h1": [
                              "manrope"
                      ],
                      "body-lg": [
                              "inter"
                      ],
                      "label-caps": [
                              "inter"
                      ],
                      "body-md": [
                              "inter"
                      ],
                      "h2": [
                              "manrope"
                      ]
              },
              "fontSize": {
                      "data-tabular": [
                              "14px",
                              {
                                      "lineHeight": "20px",

                      ],
                      "h1": [
                              "28px",

                                      "lineHeight": "36px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"

                      ],
                      "body-lg": [
                              "16px",

                                      "lineHeight": "24px",
                                      "fontWeight": "400"

                      ],
                      "label-caps": [

                                      "lineHeight": "16px",

                                      "fontWeight": "600"

                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "h2": [
                              "22px",
                              {
                                      "lineHeight": "28px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"

                      ]
              }
            }
          }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen pb-safe">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md docked full-width top-0 sticky z-50 border-b border-slate-200/60 dark:border-slate-800/60 shadow-sm dark:shadow-none flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-stack-gap hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150 rounded-full p-1 cursor-pointer">
<img alt="User profile photo" class="w-8 h-8 rounded-full object-cover border border-outline-variant" data-alt="close up professional headshot of a person looking forward in natural daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCz841Zkw0eFY5WuELxzNzrZCWV822LfQigIfKP-qsve-TPoK9wDtA8wcvRprzEbTlwq1U0qQDSxj3fQezU1qMLKeTCLBweAA0f0ftkpoi8doyo2jHjkZElsfIx-7EvbTUvgpWwJYvLZdwL3XhcHDxrtTQ3Yk7mX_Sny2-UhmdGB8RvqS1wqpOxrscNTZiShV9oVrnGNqt-L7yZ5_hsZc-LxdCmJ92CbjkXgx_xQLYehpLBlF0VhZxP4NJ_v6S-fR567TB690lmqlbK"/>
</div>
<h1 class="text-xl font-black tracking-tight text-indigo-600 dark:text-indigo-400">InventoryFlow</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400">search</span>
</button>
</header>
<!-- Main Canvas -->
<main class="px-container-padding pt-lg pb-[100px] flex flex-col gap-lg md:hidden">
<!-- Header Section -->
<section class="flex flex-col gap-base">
<h2 class="font-h1 text-h1 text-on-background">Dashboard</h2>
<p class="font-body-md text-body-md text-on-surface-variant">General overview for today</p>
</section>
<!-- Bento Grid Metrics -->
<section class="flex flex-col gap-sm">
<!-- Main Valorization Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm shadow-[0_4px_12px_rgba(30,41,59,0.05)]">
<div class="flex items-center justify-between">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Valorización</span>
<span class="material-symbols-outlined text-primary text-[20px]">account_balance_wallet</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-h1 text-h1 text-on-background">$2,450,180</span>
<div class="flex items-center gap-xs text-primary bg-primary/10 w-fit px-2 py-0.5 rounded-sm">
<span class="material-symbols-outlined text-[14px]">trending_up</span>
<span class="font-data-tabular text-data-tabular text-xs">+4.2%</span>
</div>
</div>
</div>
<!-- Split Metric Cards -->
<div class="grid grid-cols-2 gap-sm">
<!-- Productos Totales -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-md shadow-[0_4px_12px_rgba(30,41,59,0.05)]">
<div class="flex w-10 h-10 rounded-full bg-surface-container items-center justify-center">
<span class="material-symbols-outlined text-primary">inventory_2</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-h2 text-h2 text-on-background">8,402</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Productos totales</span>
</div>
</div>
<!-- Alertas de Stock (Red Accent) -->
<div class="bg-error-container/30 border border-error/20 rounded-xl p-md flex flex-col gap-md shadow-[0_4px_12px_rgba(30,41,59,0.05)]">
<div class="flex w-10 h-10 rounded-full bg-error-container items-center justify-center">
<span class="material-symbols-outlined text-error">warning</span>
</div>
<div class="flex flex-col gap-xs">
<span class="font-h2 text-h2 text-error">24</span>
<span class="font-label-caps text-label-caps text-error uppercase">Alertas de stock</span>
</div>
</div>
</div>
</section>
<!-- Chart Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-md shadow-[0_4px_12px_rgba(30,41,59,0.05)]">
<div class="flex items-center justify-between">
<h3 class="font-h2 text-h2 text-on-background text-lg">Weekly movement</h3>
<button class="text-on-surface-variant hover:bg-surface-container rounded-full p-1 transition-colors">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</div>
<!-- Simple SVG Chart Representation -->
<div class="w-full h-32 relative mt-sm">
<!-- Grid Lines -->
<div class="absolute inset-0 flex flex-col justify-between border-l border-b border-outline-variant/30 pb-6 pl-2">
<div class="w-full border-t border-outline-variant/20 border-dashed"></div>
<div class="w-full border-t border-outline-variant/20 border-dashed"></div>
<div class="w-full border-t border-outline-variant/20 border-dashed"></div>
</div>
<!-- Line Chart Path -->
<svg class="w-full h-[calc(100%-24px)] text-primary overflow-visible absolute top-0 left-2" preserveaspectratio="none" viewbox="0 0 100 40">
<path d="M0,35 Q10,20 20,25 T40,15 T60,20 T80,5 T100,10" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<!-- Data Points -->
<circle class="text-primary" cx="20" cy="25" fill="currentColor" r="1.5"></circle>
<circle class="text-primary" cx="40" cy="15" fill="currentColor" r="1.5"></circle>
<circle class="text-primary" cx="60" cy="20" fill="currentColor" r="1.5"></circle>
<circle class="text-primary" cx="80" cy="5" fill="currentColor" r="1.5"></circle>
<circle class="text-primary" cx="100" cy="10" fill="currentColor" r="1.5"></circle>
</svg>
<!-- X Axis Labels -->
<div class="absolute bottom-0 left-2 right-0 flex justify-between text-[10px] font-data-tabular text-on-surface-variant uppercase px-2">
<span>Mon</span>
<span>Wed</span>
<span>Fri</span>
<span>Sun</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg fixed w-full z-50 rounded-t-2xl border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(30,41,59,0.05)]  bottom-0 left-0 right-0 h-20 px-6 flex items-center justify-between pb-safe md:hidden">
<!-- Active: Home -->
<button class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 rounded-xl px-3 py-1 hover:bg-slate-50 dark:hover:bg-slate-800/50 active:scale-90 transition-transform duration-200 gap-1 min-w-[64px]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Home</span>
</button>
<!-- Inactive: Inventory -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50 active:scale-90 transition-transform duration-200 gap-1 min-w-[64px]">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Inventory</span>
</button>
<!-- Inactive: Scanner -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50 active:scale-90 transition-transform duration-200 gap-1 min-w-[64px]">
<span class="material-symbols-outlined">qr_code_scanner</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Scanner</span>
</button>
<!-- Inactive: Settings -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50 active:scale-90 transition-transform duration-200 gap-1 min-w-[64px]">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Settings</span>
</button>
</nav>
</body></html>
